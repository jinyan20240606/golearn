syntax = "proto3";

option go_package = "./;proto";




service Greeter {
  rpc GetStream(StreamReqData) returns (stream StreamResData); // 启用服务端流模式
  rpc PutStream(stream StreamReqData) returns (StreamResData); // 启用客户端流模式
  rpc AllStream(stream StreamReqData) returns (stream StreamResData);   // 启用双向流模式
}


message StreamReqData {
    string data = 1;
}




message StreamResData {
    string data = 1;
}