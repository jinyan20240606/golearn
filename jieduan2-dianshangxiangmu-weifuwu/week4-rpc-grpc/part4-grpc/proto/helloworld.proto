syntax = "proto3"; // 声明使用 Protobuf 版本 3，现在必须写这个，不写默认是老版本 proto2

// 新版 protoc 必须在 .proto 文件里声明 go_package

option go_package = "./;helloworld"; // 👈 就加这一行！
// ./ 表示生成到当前目录 和 ;helloworld 表示生成的 Go package 叫 helloworld

service Hello { // 这个语句实际protobuf本身是不支持解析的，它是protoc-grpc插件才支持的，专门用于grpc语法的
  // 这里接收的参数只能使用下面定义的消息结构体类型参数
  rpc Hello(HelloWorldRequest) returns (HelloWorldResponse); // 这就是一个Hello接口，没有实际内容
  // 这个最终会编译成服务端rpc使用的接口：如0304-5/server_proxy/server_proxy.go中的那个原生写法，会生成helloworld_grpc.pb.go文件
}

// 定义一个 “消息结构体”，相当于 Go 里的 struct。名字一般叫：XXXRequest = 请求体
// 用来客户端发给服务端的数据
message HelloWorldRequest { // 会对应生成客户端的请求方法
  string name = 1; // 1是编号 ，不是值，是序列化时的标识 ID
  int32 age = 2; // int不支持，需要使用int32或64
  repeated string courses = 3;// 相当于Courses []string, 定义切片类型，列表、数组、多个值 都用 repeated
  // 代表 courses是一个[]string 类型
}

// 服务端 返回给客户端 的结构体
message HelloWorldResponse { // 会对应生成服务端的接口方法
  string message = 1;
}