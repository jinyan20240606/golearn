syntax = "proto3";
import "base.proto";
import "google/protobuf/empty.proto";
option go_package = "./;proto";



service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply);
  rpc Ping(google.protobuf.Empty) returns (Pong);

}


message HelloRequest {
  string name = 1; // 1是编号 ，不是值
  int32 age = 2;
}

message HelloReply {
  string message = 1;
}