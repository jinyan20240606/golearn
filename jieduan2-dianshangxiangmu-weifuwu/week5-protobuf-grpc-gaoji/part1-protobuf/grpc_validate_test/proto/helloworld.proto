syntax = "proto3";
import "validate.proto"
// 新版 protoc 必须在 .proto 文件里声明 go_package

option go_package = "./;proto"; // 👈 就加这一行！


service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

message HelloRequest {
// 验证器就是：可以在定义类型时，直接添加验证规则，然后protoc-gen-go-validate插件会自动生成验证代码，并且在服务端调用时，会自动验证数据，不合法直接被拦截
  string name = 1 [(validate.rules).string = {min_len: 1}];
}